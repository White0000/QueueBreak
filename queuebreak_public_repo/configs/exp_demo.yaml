run_name: demo
seed: 42
models_file: configs/models.yaml
slas_file: configs/slas.yaml
use_fallback_models: false
workload:
  n_workflows: 30
  arrival_rate_rps: 2.0
  burstiness: 2.2
  mix:
    iot_triage: 0.34
    tool_fanout: 0.33
    repair_heavy: 0.33
  sla_tiers:
  - fast
  - balanced
  - eco
tools:
  base_latency_ms: 80
  jitter_ms: 80
  failure_prob: 0.2
llm:
  temperature: 0.0
  do_sample: false
measurement:
  enable_nvml: true
  sample_hz: 20
  idle_baseline_seconds: 5
output:
  out_dir: runs
  save_parquet: true
  save_jsonl: true
  make_plots: true

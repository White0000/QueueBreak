run_name: smoke
seed: 42
models_file: configs/models.yaml
slas_file: configs/slas.yaml
use_fallback_models: true
workload:
  n_workflows: 6
  arrival_rate_rps: 0.5
  burstiness: 1.5
  mix:
    iot_triage: 0.4
    tool_fanout: 0.4
    repair_heavy: 0.2
  sla_tiers:
  - fast
  - balanced
  - eco
tools:
  base_latency_ms: 60
  jitter_ms: 50
  failure_prob: 0.15
llm:
  temperature: 0.0
  do_sample: false
  max_new_tokens_override: 80
measurement:
  enable_nvml: true
  sample_hz: 20
  idle_baseline_seconds: 3
output:
  out_dir: runs
  save_parquet: true
  save_jsonl: true
  make_plots: true
